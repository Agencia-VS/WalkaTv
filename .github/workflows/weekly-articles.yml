name: Weekly Articles Autopublish

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-articles-autopublish
  cancel-in-progress: false

jobs:
  generate-and-push:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci

      - name: Install Whisper dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python -m pip install --upgrade pip
          pip install -r scripts/requirements-whisper.txt

      - name: Generate weekly articles
        run: npm run articles:weekly
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY || secrets.NEXT_PUBLIC_YOUTUBE_API_KEY }}
          YT_CHANNEL_ID: ${{ secrets.YT_CHANNEL_ID || secrets.NEXT_PUBLIC_YOUTUBE_CHANNEL_ID }}
          YT_OAUTH_CLIENT_ID: ${{ secrets.YT_OAUTH_CLIENT_ID }}
          YT_OAUTH_CLIENT_SECRET: ${{ secrets.YT_OAUTH_CLIENT_SECRET }}
          YT_OAUTH_REFRESH_TOKEN: ${{ secrets.YT_OAUTH_REFRESH_TOKEN }}
          YT_OAUTH_DISABLE: "true"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WEEKLY_LOOKBACK_DAYS: ${{ vars.WEEKLY_LOOKBACK_DAYS }}
          WEEKLY_TOP_N: ${{ vars.WEEKLY_TOP_N }}
          WEEKLY_MIN_VIEWS: ${{ vars.WEEKLY_MIN_VIEWS }}
          WEEKLY_MAX_ATTEMPTS: ${{ vars.WEEKLY_MAX_ATTEMPTS }}
          WEEKLY_FAIL_IF_NONE_GENERATED: ${{ vars.WEEKLY_FAIL_IF_NONE_GENERATED }}
          WEEKLY_DEFAULT_CATEGORY: ${{ vars.WEEKLY_DEFAULT_CATEGORY }}
          WEEKLY_EXCLUDE_SHORTS: ${{ vars.WEEKLY_EXCLUDE_SHORTS }}
          WHISPER_ENABLED: "true"
          WHISPER_MODEL: ${{ vars.WHISPER_MODEL }}
          WHISPER_LANGUAGE: ${{ vars.WHISPER_LANGUAGE }}
          WHISPER_MAX_AUDIO_MINUTES: ${{ vars.WHISPER_MAX_AUDIO_MINUTES }}
          YTDLP_COOKIES_GZ_B64: ${{ secrets.YTDLP_COOKIES_GZ_B64 }}
          YTDLP_COOKIES_B64: ${{ secrets.YTDLP_COOKIES_B64 }}
          YTDLP_COOKIES_TXT: ${{ secrets.YTDLP_COOKIES_TXT }}
          YTDLP_USER_AGENT: ${{ vars.YTDLP_USER_AGENT }}

      - name: Commit and push generated articles
        run: |
          if [[ -z "$(git status --porcelain content/articulos)" ]]; then
            echo "No new articles to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/articulos
          git commit -m "chore: weekly auto-generated articles"
          git push origin HEAD:main
