name: Weekly Articles Autopublish

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-articles-autopublish
  cancel-in-progress: false

jobs:
  generate-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate weekly articles
        run: npm run articles:weekly
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY || secrets.NEXT_PUBLIC_YOUTUBE_API_KEY }}
          YT_CHANNEL_ID: ${{ secrets.YT_CHANNEL_ID || secrets.NEXT_PUBLIC_YOUTUBE_CHANNEL_ID }}
          YT_OAUTH_CLIENT_ID: ${{ secrets.YT_OAUTH_CLIENT_ID }}
          YT_OAUTH_CLIENT_SECRET: ${{ secrets.YT_OAUTH_CLIENT_SECRET }}
          YT_OAUTH_REFRESH_TOKEN: ${{ secrets.YT_OAUTH_REFRESH_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WEEKLY_LOOKBACK_DAYS: ${{ vars.WEEKLY_LOOKBACK_DAYS }}
          WEEKLY_TOP_N: ${{ vars.WEEKLY_TOP_N }}
          WEEKLY_MIN_VIEWS: ${{ vars.WEEKLY_MIN_VIEWS }}
          WEEKLY_DEFAULT_CATEGORY: ${{ vars.WEEKLY_DEFAULT_CATEGORY }}
          WEEKLY_EXCLUDE_SHORTS: ${{ vars.WEEKLY_EXCLUDE_SHORTS }}

      - name: Commit and push generated articles
        run: |
          if [[ -z "$(git status --porcelain content/articulos)" ]]; then
            echo "No new articles to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/articulos
          git commit -m "chore: weekly auto-generated articles"
          git push origin HEAD:main
